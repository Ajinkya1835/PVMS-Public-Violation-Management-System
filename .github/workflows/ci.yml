name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      MONGO_URI: mongodb://localhost:27017/pvms
      JWT_SECRET: ci_test_secret
      PORT: 5000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend
        run: npm ci --prefix backend

      - name: Install frontend
        run: npm ci --prefix frontend

      - name: Import demo database
        run: npm run db:import --prefix backend

      - name: Start API
        run: npm run start --prefix backend &

      - name: Wait for API
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:5000/health && exit 0
            sleep 2
          done
          exit 1

      - name: API smoke tests
        run: npm run test:api --prefix backend

      - name: Build frontend
        run: npm run build --prefix frontend
        env:
          VITE_API_URL: http://localhost:5000
